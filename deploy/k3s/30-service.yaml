apiVersion: v1
kind: Service
metadata:
  name: herald
  namespace: cwb
  labels:
    app: herald
spec:
  type: ClusterIP
  selector:
    app: herald
  ports:
    - name: http
      port: 8099
      targetPort: http
      protocol: TCP
    # gRPC admin/internal API (mTLS) — interchange + cairn dial herald.cwb.svc:8098.
    - name: grpc
      port: 8098
      targetPort: grpc
      protocol: TCP
