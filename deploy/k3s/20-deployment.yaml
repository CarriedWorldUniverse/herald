apiVersion: apps/v1
kind: Deployment
metadata:
  name: herald
  namespace: cwb
  labels:
    app: herald
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: herald
  template:
    metadata:
      labels:
        app: herald
    spec:
      containers:
        - name: herald
          image: ghcr.io/carriedworlduniverse/herald:sha-67093f5@sha256:8fc485caae64b31805f50fe17a17e793500083b9af785ea630fd53c0261211b6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8099
            - name: grpc
              containerPort: 8098
          env:
            - name: HERALD_ADDR
              value: ":8099"
            # gRPC admin/internal API (Phase 4) over mTLS, fronted by interchange.
            - name: HERALD_GRPC_ADDR
              value: ":8098"
            - name: HERALD_TLS_CERT
              value: "/etc/cwb/tls/tls.crt"
            - name: HERALD_TLS_KEY
              value: "/etc/cwb/tls/tls.key"
            - name: HERALD_TLS_CA
              value: "/etc/cwb/tls/ca.crt"
            - name: HERALD_DB
              value: "/var/lib/nexus/herald.db"
            - name: HERALD_ISSUER
              # Public, gateway-facing URL. Tokens carry this in `iss`; OIDC
              # discovery + jwks_uri are derived from it, so external
              # consumers resolve everything through the gateway. Override
              # via patch when running on a different host/DNS.
              value: "http://dmonextreme.tail41686e.ts.net:8080/herald/"
            - name: HERALD_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: signing_key
                  optional: true
            # Genesis (Phase 4): the admin-org owner password, supplied at deploy
            # time from a secret — NO default account/password ships in the image.
            # Optional so herald boots even before the secret is set (genesis
            # warns-and-skips); set it to seed cwadmin@carriedworld.com.
            - name: HERALD_GENESIS_OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: genesis_owner_password
                  optional: true
            # Registered OIDC clients: id|redirect_uri[,id|redirect_uri...].
            - name: HERALD_OIDC_CLIENTS
              value: "atlas|https://atlas.tail41686e.ts.net/oauth/callback"
          volumeMounts:
            - name: data
              mountPath: /var/lib/nexus
            - name: tls
              mountPath: /etc/cwb/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: herald-data
        - name: tls
          secret:
            secretName: herald-tls
