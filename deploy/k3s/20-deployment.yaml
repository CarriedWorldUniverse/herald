apiVersion: apps/v1
kind: Deployment
metadata:
  name: herald
  namespace: cwb
  labels:
    app: herald
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: herald
  template:
    metadata:
      labels:
        app: herald
    spec:
      containers:
        - name: herald
          image: localhost/herald:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8099
          env:
            - name: HERALD_ADDR
              value: ":8099"
            - name: HERALD_DB
              value: "/var/lib/nexus/herald.db"
            - name: HERALD_ISSUER
              # Public, gateway-facing URL. Tokens carry this in `iss`; OIDC
              # discovery + jwks_uri are derived from it, so external
              # consumers resolve everything through the gateway. Override
              # via patch when running on a different host/DNS.
              value: "http://dmonextreme.tail41686e.ts.net:8080/herald/"
            - name: HERALD_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: admin_token
            - name: HERALD_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: herald-secrets
                  key: signing_key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/nexus
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: herald-data
